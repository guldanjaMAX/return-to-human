<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Radial glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4872c" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#c45a1a" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#8b3a10" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0a08" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Gold line gradient -->
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#d4872c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.6"/>
    </linearGradient>
    
    <linearGradient id="emberLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c45a1a" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#d4872c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c45a1a" stop-opacity="0.3"/>
    </linearGradient>
    
    <!-- Subtle pulse animation -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="#0a0a08"/>
  
  <!-- Central glow -->
  <circle cx="400" cy="400" r="350" fill="url(#glow)"/>
  
  <!-- Outer circle -->
  <circle cx="400" cy="400" r="320" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.25"/>
  
  <!-- Flower of Life - 7 overlapping circles -->
  <g fill="none" stroke="url(#goldLine)" stroke-width="0.8" opacity="0.4" filter="url(#softGlow)">
    <!-- Center -->
    <circle cx="400" cy="400" r="120"/>
    <!-- 6 petals -->
    <circle cx="400" cy="280" r="120"/>
    <circle cx="503.9" cy="340" r="120"/>
    <circle cx="503.9" cy="460" r="120"/>
    <circle cx="400" cy="520" r="120"/>
    <circle cx="296.1" cy="460" r="120"/>
    <circle cx="296.1" cy="340" r="120"/>
  </g>
  
  <!-- Second ring of Flower of Life -->
  <g fill="none" stroke="#c9a84c" stroke-width="0.4" opacity="0.2">
    <circle cx="400" cy="160" r="120"/>
    <circle cx="607.8" cy="280" r="120"/>
    <circle cx="607.8" cy="520" r="120"/>
    <circle cx="400" cy="640" r="120"/>
    <circle cx="192.2" cy="520" r="120"/>
    <circle cx="192.2" cy="280" r="120"/>
    <!-- Connecting circles -->
    <circle cx="503.9" cy="220" r="120"/>
    <circle cx="296.1" cy="220" r="120"/>
    <circle cx="503.9" cy="580" r="120"/>
    <circle cx="296.1" cy="580" r="120"/>
    <circle cx="556.9" cy="400" r="120"/>
    <circle cx="243.1" cy="400" r="120"/>
  </g>
  
  <!-- Metatron's Cube - connecting lines -->
  <g stroke="#d4872c" stroke-width="0.6" opacity="0.35" filter="url(#softGlow)">
    <!-- Hexagonal frame -->
    <line x1="400" y1="200" x2="573.2" y2="300"/>
    <line x1="573.2" y1="300" x2="573.2" y2="500"/>
    <line x1="573.2" y1="500" x2="400" y2="600"/>
    <line x1="400" y1="600" x2="226.8" y2="500"/>
    <line x1="226.8" y1="500" x2="226.8" y2="300"/>
    <line x1="226.8" y1="300" x2="400" y2="200"/>
    <!-- Inner star connections -->
    <line x1="400" y1="200" x2="573.2" y2="500"/>
    <line x1="400" y1="200" x2="226.8" y2="500"/>
    <line x1="573.2" y1="300" x2="226.8" y2="500"/>
    <line x1="573.2" y1="300" x2="400" y2="600"/>
    <line x1="573.2" y1="500" x2="226.8" y2="300"/>
    <line x1="226.8" y1="300" x2="400" y2="600"/>
    <!-- Cross connections -->
    <line x1="400" y1="200" x2="400" y2="600"/>
    <line x1="226.8" y1="300" x2="573.2" y2="500"/>
    <line x1="573.2" y1="300" x2="226.8" y2="500"/>
  </g>
  
  <!-- Metatron's Cube vertices -->
  <g fill="#d4872c" opacity="0.5">
    <circle cx="400" cy="200" r="4"/>
    <circle cx="573.2" cy="300" r="4"/>
    <circle cx="573.2" cy="500" r="4"/>
    <circle cx="400" cy="600" r="4"/>
    <circle cx="226.8" cy="500" r="4"/>
    <circle cx="226.8" cy="300" r="4"/>
    <circle cx="400" cy="400" r="5"/>
  </g>
  
  <!-- Inner triangle pointing up (divine masculine) -->
  <polygon points="400,230 555,510 245,510" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.3" filter="url(#outerGlow)"/>
  
  <!-- Inner triangle pointing down (divine feminine) -->
  <polygon points="400,570 555,290 245,290" fill="none" stroke="#d4872c" stroke-width="1" opacity="0.3" filter="url(#outerGlow)"/>
  
  <!-- Golden ratio spiral hints (quarter arcs) -->
  <g fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.2">
    <path d="M 400 400 Q 400 320 460 320"/>
    <path d="M 460 320 Q 520 320 520 370"/>
    <path d="M 520 370 Q 520 400 490 400"/>
  </g>
  
  <!-- Six pillar dots around the outer ring -->
  <g filter="url(#outerGlow)">
    <!-- Spirit (top) -->
    <circle cx="400" cy="100" r="6" fill="#d4872c" opacity="0.7"/>
    <!-- Body (top-right) -->
    <circle cx="660" cy="250" r="6" fill="#d4872c" opacity="0.7"/>
    <!-- Ceremony (bottom-right) -->
    <circle cx="660" cy="550" r="6" fill="#d4872c" opacity="0.7"/>
    <!-- Purpose (bottom) -->
    <circle cx="400" cy="700" r="6" fill="#d4872c" opacity="0.7"/>
    <!-- Adventure (bottom-left) -->
    <circle cx="140" cy="550" r="6" fill="#d4872c" opacity="0.7"/>
    <!-- Heart (top-left) -->
    <circle cx="140" cy="250" r="6" fill="#d4872c" opacity="0.7"/>
  </g>
  
  <!-- Connecting lines from pillar dots to center -->
  <g stroke="#d4872c" stroke-width="0.3" opacity="0.15">
    <line x1="400" y1="100" x2="400" y2="400"/>
    <line x1="660" y1="250" x2="400" y2="400"/>
    <line x1="660" y1="550" x2="400" y2="400"/>
    <line x1="400" y1="700" x2="400" y2="400"/>
    <line x1="140" y1="550" x2="400" y2="400"/>
    <line x1="140" y1="250" x2="400" y2="400"/>
  </g>
  
  <!-- Meditation figure silhouette -->
  <g transform="translate(400, 420)" fill="#f2ece0" opacity="0.85">
    <!-- Head -->
    <circle cx="0" cy="-95" r="22"/>
    <!-- Neck -->
    <rect x="-6" y="-73" width="12" height="10" rx="3"/>
    <!-- Torso -->
    <path d="M -30 -63 Q -35 -30 -28 0 Q -20 15 0 18 Q 20 15 28 0 Q 35 -30 30 -63 Z"/>
    <!-- Left arm - meditation pose -->
    <path d="M -30 -55 Q -55 -35 -65 -15 Q -70 0 -55 10 Q -40 15 -30 5 Q -25 -5 -28 -10" fill="#f2ece0"/>
    <!-- Right arm - meditation pose -->
    <path d="M 30 -55 Q 55 -35 65 -15 Q 70 0 55 10 Q 40 15 30 5 Q 25 -5 28 -10" fill="#f2ece0"/>
    <!-- Left leg - lotus position -->
    <path d="M -28 5 Q -45 15 -60 20 Q -70 22 -65 30 Q -55 35 -40 30 Q -20 25 -5 18" fill="#f2ece0"/>
    <!-- Right leg - lotus position -->
    <path d="M 28 5 Q 45 15 60 20 Q 70 22 65 30 Q 55 35 40 30 Q 20 25 5 18" fill="#f2ece0"/>
    <!-- Hands resting on knees -->
    <circle cx="-58" cy="12" r="7"/>
    <circle cx="58" cy="12" r="7"/>
  </g>
  
  <!-- Subtle energy aura around figure -->
  <ellipse cx="400" cy="410" rx="90" ry="110" fill="none" stroke="#d4872c" stroke-width="0.8" opacity="0.15" filter="url(#outerGlow)"/>
  <ellipse cx="400" cy="410" rx="110" ry="130" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Outermost decorative ring -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.15"/>
  
  <!-- Tick marks on outer ring for each pillar -->
  <g stroke="#c9a84c" stroke-width="1" opacity="0.3">
    <line x1="400" y1="18" x2="400" y2="30"/>
    <line x1="731" y1="209" x2="721" y2="218"/>
    <line x1="731" y1="591" x2="721" y2="582"/>
    <line x1="400" y1="782" x2="400" y2="770"/>
    <line x1="69" y1="591" x2="79" y2="582"/>
    <line x1="69" y1="209" x2="79" y2="218"/>
  </g>
</svg>
